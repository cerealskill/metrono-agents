name: Rebuild Registry

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild registry
        run: node scripts/build-registry.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/lib/agents-data.ts web/public/agents.json
          git diff --cached --quiet || git commit -m "chore: auto-rebuild registry [skip ci]"
          git push
