name: Product Team
slug: product-team
description: Sprint-based product team that grooms the backlog, runs scrum ceremonies, manages feature requests, and publishes release notes
category: saas
tags: [product, scrum, backlog, feature-management, roadmap, release]
members:
  - slug: product-owner
    role: Product Owner — owns the roadmap and prioritizes the backlog
  - slug: product-scrum
    role: Scrum Master — facilitates sprints, retros, and removes blockers
  - slug: feature-request
    role: Feature Manager — triages and scores incoming feature requests
  - slug: release-notes
    role: Release Manager — writes and publishes release notes for every deploy
workflow: weekly-planning
author: cerealskill
version: 1.0.0
language: en
